# Prompt Tuning Configuration for Medical Summarization
# Extends base_config.yaml with prompt tuning-specific parameters

# ============================================
# Prompt Tuning Hyperparameters
# ============================================
prompt_tuning:
  # Number of virtual tokens (soft prompts)
  # More tokens = more parameters, potentially better performance
  # Typical values: 8, 16, 20, 50, 100
  num_virtual_tokens: 20
  
  # Initialization method for prompt embeddings
  # Options: RANDOM, TEXT
  prompt_tuning_init: TEXT
  
  # If TEXT initialization, the text to use
  # Should be task-relevant for better starting point
  prompt_tuning_init_text: "Summarize the following medical article:"
  
  # Task type for PEFT
  task_type: SEQ_2_SEQ_LM
  
  # Token dimension (will be auto-set from model config)
  token_dim: null
  
  # Number of transformer submodules (for encoder-decoder models)
  num_transformer_submodules: null
  
  # Number of attention heads (for some init methods)
  num_attention_heads: null
  
  # Number of layers (for some init methods)
  num_layers: null

# ============================================
# Training Overrides for Prompt Tuning
# ============================================
training:
  # Prompt tuning often needs higher learning rate
  # Since we're only training the soft prompts
  learning_rate: 3.0e-2
  
  # Can use even larger batch sizes
  per_device_train_batch_size: 16
  gradient_accumulation_steps: 1
  
  # May need more epochs for convergence
  num_epochs: 10
  
  # Learning rate scheduler
  lr_scheduler_type: linear
  warmup_ratio: 0.1
  
  # Evaluation frequency
  eval_steps: 500
  logging_steps: 100
  
  # Gradient settings
  max_grad_norm: 1.0
  
  # Optimizer - AdamW works well for prompt tuning
  # Some papers suggest Adafactor can also work
  optimizer: adamw_torch

# ============================================
# Prompt Design Variations
# ============================================
variants:
  # Minimal soft prompts
  minimal:
    num_virtual_tokens: 8
    prompt_tuning_init: TEXT
    prompt_tuning_init_text: "Summarize:"
    
  # Standard configuration
  standard:
    num_virtual_tokens: 20
    prompt_tuning_init: TEXT
    prompt_tuning_init_text: "Summarize the following medical article:"
    
  # Extended soft prompts
  extended:
    num_virtual_tokens: 50
    prompt_tuning_init: TEXT
    prompt_tuning_init_text: "Generate a concise summary of the following medical research article, highlighting key findings:"
    
  # Random initialization (for comparison)
  random_init:
    num_virtual_tokens: 20
    prompt_tuning_init: RANDOM

# ============================================
# Prefix Tuning Alternative
# ============================================
# If you want to also compare with Prefix Tuning:
prefix_tuning:
  enabled: false
  num_virtual_tokens: 20
  prefix_projection: true
  encoder_hidden_size: null  # Auto from model
  token_dim: null            # Auto from model

# ============================================
# Expected Metrics
# ============================================
# Trainable parameters for prompt tuning are very small:
# Formula: num_virtual_tokens × embedding_dim
# Flan-T5 Small (d=512):  20 × 512 = 10,240 params (~0.01%)
# Flan-T5 Base (d=768):   20 × 768 = 15,360 params (~0.006%)
# Flan-T5 Large (d=1024): 20 × 1024 = 20,480 params (~0.003%)

# Note: Prompt tuning is MUCH more parameter-efficient than LoRA
# but may require more training data and epochs to achieve good performance
